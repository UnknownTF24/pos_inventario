<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Móvil & Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">POS & Control de Inventario</h1>
        <a href="admin.html" class="bg-blue-800 hover:bg-blue-900 px-4 py-2 rounded text-sm font-medium transition shadow">Administración ⚙️</a>
    </header>

    <main class="flex-1 p-4 max-w-md mx-auto w-full space-y-4">
        
        <div class="bg-white p-4 rounded-xl shadow-md space-y-2">
            <h2 class="text-lg font-semibold text-gray-700">Escanear Producto</h2>
            
            <!-- Contenedor visible para cámara en vivo -->
            <div id="reader" class="overflow-hidden rounded-lg border border-gray-300 bg-gray-50"></div>
            
            <!-- Lector oculto para procesar fotos sin deformar la pantalla -->
            <div id="lector-oculto" style="display: none;"></div>
            
            <div class="grid grid-cols-2 gap-2">
                <button id="start-btn" class="bg-green-500 text-white py-2 rounded-lg font-medium shadow hover:bg-green-600 transition">📷 Cámara Vivo</button>
                <button id="stop-btn" class="bg-red-500 text-white py-2 rounded-lg font-medium shadow hover:bg-red-600 transition hidden col-span-2">Apagar Cámara</button>
                <button type="button" onclick="document.getElementById('native-cam-input').click()" class="bg-purple-600 text-white py-2 rounded-lg font-medium shadow hover:bg-purple-700 transition">📸 Tomar Foto</button>
            </div>
            <input type="file" id="native-cam-input" accept="image/*" capture="environment" style="display:none">
        </div>

        <div class="bg-white p-4 rounded-xl shadow-md flex gap-2">
            <input id="manual-code" type="text" placeholder="Código de barras / Lector" class="flex-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="add-manual-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Agregar</button>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-md space-y-4">
            <h2 class="text-lg font-semibold text-gray-700">Detalle de la Venta</h2>
            <div id="cart-items" class="space-y-2 max-h-64 overflow-y-auto pr-1">
                <p class="text-gray-400 text-center py-4">No hay productos en la lista</p>
            </div>
            <div class="flex justify-between items-center pt-4 border-t border-gray-200">
                <span class="text-lg font-bold text-gray-800">Total:</span>
                <span id="cart-total" class="text-2xl font-bold text-blue-600">Q0.00</span>
            </div>
            <button id="checkout-btn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg shadow hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                Confirmar Venta y Cobrar
            </button>
        </div>
    </main>

    <script>
        const API_URL = "https://backend-pos-tienda.onrender.com/api"; 
        let cart = [];
        let html5QrcodeScanner = null;

        const cartItemsContainer = document.getElementById("cart-items");
        const cartTotalElement = document.getElementById("cart-total");
        const checkoutBtn = document.getElementById("checkout-btn");
        const startBtn = document.getElementById("start-btn");
        const stopBtn = document.getElementById("stop-btn");
        const manualInput = document.getElementById("manual-code");
        const addManualBtn = document.getElementById("add-manual-btn");

        // Autofocus Lector Físico
        document.body.addEventListener("click", (e) => {
            if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') manualInput.focus();
        });
        manualInput.focus();

        // --- CÁMARA NATIVA (FOTO) - ARREGLO ESPACIO EN BLANCO ---
        const nativeInput = document.getElementById("native-cam-input");
        nativeInput.addEventListener("change", e => {
            if (e.target.files.length == 0) return;
            const imageFile = e.target.files[0];
            
            // Usamos el "lector-oculto" para que la imagen gigante no se vea en pantalla
            const scanner = new Html5Qrcode("lector-oculto");
            scanner.scanFile(imageFile, true)
                .then(decodedText => { fetchProduct(decodedText); })
                .catch(err => { Swal.fire({ icon: 'error', title: 'Ups', text: 'No se detectó código. Intenta centrarlo mejor.' }); })
                .finally(() => { scanner.clear(); }); // Limpiamos la memoria al terminar
        });

        async function fetchProduct(code) {
            try {
                const response = await fetch(`${API_URL}/productos/${code}`);
                if (!response.ok) {
                    Swal.fire({ icon: 'error', title: 'Oops...', text: "Error al buscar el producto." });
                    manualInput.value = ""; manualInput.focus();
                    return;
                }
                const product = await response.json();
                addToCart(product);
                manualInput.value = ""; manualInput.focus();
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Sin conexión', text: 'No se pudo conectar.' });
            }
        }

        function addToCart(product) {
            const existingItem = cart.find(item => item.codigo === product.codigo);
            if (existingItem) {
                if (existingItem.cantidad < product.stock) {
                    existingItem.cantidad++;
                } else {
                    Swal.fire({ icon: 'warning', title: 'Stock', text: `Límite alcanzado.` });
                    return;
                }
            } else {
                cart.push({ ...product, cantidad: 1 });
            }
            updateCartUI();
        }

        function updateCartUI() {
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<p class="text-gray-400 text-center py-4">No hay productos en la lista</p>`;
                cartTotalElement.innerText = "Q0.00";
                checkoutBtn.disabled = true;
                return;
            }
            cartItemsContainer.innerHTML = cart.map((item, index) => `
                <div class="flex flex-col py-3 border-b border-gray-100 last:border-0">
                    <div class="flex justify-between items-start mb-2">
                        <div><p class="font-medium text-gray-800">${item.nombre}</p></div>
                        <button onclick="removeFromCart(${index})" class="text-red-400 hover:text-red-600 font-bold px-2 py-1">✕</button>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="flex items-center border border-gray-300 rounded-lg bg-white">
                            <button onclick="decreaseQuantity(${index})" class="bg-gray-100 px-3 py-1 font-bold">-</button>
                            <span class="px-4 py-1 font-bold w-12 text-center">${item.cantidad}</span>
                            <button onclick="increaseQuantity(${index})" class="bg-gray-100 px-3 py-1 font-bold">+</button>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-gray-800 text-lg">Q${(item.precio * item.cantidad).toFixed(2)}</p>
                        </div>
                    </div>
                </div>
            `).join("");
            const total = cart.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
            cartTotalElement.innerText = `Q${total.toFixed(2)}`;
            checkoutBtn.disabled = false;
        }

        window.increaseQuantity = function(index) {
            if (cart[index].cantidad < cart[index].stock) { cart[index].cantidad++; updateCartUI(); }
        };
        window.decreaseQuantity = function(index) {
            if (cart[index].cantidad > 1) { cart[index].cantidad--; updateCartUI(); } else { removeFromCart(index); }
        };
        window.removeFromCart = function(index) { cart.splice(index, 1); updateCartUI(); };

        checkoutBtn.addEventListener("click", async () => {
            if (cart.length === 0) return;
            const payload = { items: cart.map(item => ({ codigo: item.codigo, cantidad: item.cantidad })) };
            const totalVenta = cart.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
            const cartCopia = [...cart];

            try {
                const response = await fetch(`${API_URL}/ventas`, {
                    method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload)
                });
                if (response.ok) {
                    cart = []; updateCartUI();
                    Swal.fire({
                        title: '¡Venta Exitosa!', text: `Cobrado: Q${totalVenta.toFixed(2)}`, icon: 'success',
                        showCancelButton: true, confirmButtonText: '🖨️ Imprimir', cancelButtonText: 'Cerrar'
                    }).then((r) => { if (r.isConfirmed) imprimirTicket(cartCopia, totalVenta); });
                }
            } catch (error) {}
        });

        function imprimirTicket(items, total) {
            let ventana = window.open('', 'PRINT', 'height=600,width=400');
            let fecha = new Date().toLocaleString();
            let html = `<html><head><style>body { font-family: monospace; font-size: 14px; width: 300px; padding: 10px; } table { width: 100%; border-collapse: collapse; margin-top: 10px; } th, td { text-align: left; border-bottom: 1px dashed #000; } .total { font-weight: bold; font-size: 16px; margin-top: 15px; text-align: right; }</style></head><body><h2>MI TIENDA</h2><p>${fecha}</p><table><tr><th>Cant</th><th>Artículo</th><th style="text-align:right">Sub</th></tr>${items.map(item => `<tr><td>${item.cantidad}</td><td>${item.nombre.substring(0, 15)}</td><td style="text-align:right">Q${(item.precio * item.cantidad).toFixed(2)}</td></tr>`).join('')}</table><div class="total">TOTAL: Q${total.toFixed(2)}</div></body></html>`;
            ventana.document.write(html); ventana.document.close(); ventana.focus();
            setTimeout(() => { ventana.print(); ventana.close(); }, 500);
        }

        function stopScanning() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().catch(e => console.log(e));
                startBtn.classList.remove("hidden"); stopBtn.classList.add("hidden");
            }
        }

        startBtn.addEventListener("click", () => {
            startBtn.classList.add("hidden"); stopBtn.classList.remove("hidden");
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } }, (text) => {
                if (navigator.vibrate) navigator.vibrate(100);
                fetchProduct(text); stopScanning();
            }).catch(e => { stopScanning(); });
        });

        stopBtn.addEventListener("click", stopScanning);
        addManualBtn.addEventListener("click", () => { const c = manualInput.value.trim(); if (c) fetchProduct(c); });
        manualInput.addEventListener("keypress", (e) => { if (e.key === "Enter") addManualBtn.click(); });
    </script>
</body>
</html>
