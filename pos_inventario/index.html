<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Móvil & Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">POS & Control de Inventario</h1>
        <a href="admin.html" class="bg-blue-800 hover:bg-blue-900 px-4 py-2 rounded text-sm font-medium transition shadow">Administración ⚙️</a>
    </header>

    <main class="flex-1 p-4 max-w-md mx-auto w-full space-y-4">
        
        <div class="bg-white p-4 rounded-xl shadow-md space-y-2">
            <h2 class="text-lg font-semibold text-gray-700">Escanear Producto</h2>
            <div id="reader" class="overflow-hidden rounded-lg border border-gray-300 bg-gray-50"></div>
            
            <div class="grid grid-cols-2 gap-2">
                <!-- Botón de Cámara en Vivo -->
                <button id="start-btn" class="bg-green-500 text-white py-2 rounded-lg font-medium shadow hover:bg-green-600 transition">📷 Cámara Vivo</button>
                <button id="stop-btn" class="bg-red-500 text-white py-2 rounded-lg font-medium shadow hover:bg-red-600 transition hidden">Apagar Cámara</button>
                
                <!-- Botón de Foto Nativa -->
                <button type="button" onclick="document.getElementById('native-cam-input').click()" class="bg-purple-600 text-white py-2 rounded-lg font-medium shadow hover:bg-purple-700 transition">📷 Tomar Foto</button>
            </div>
            <!-- Input invisible para la cámara nativa -->
            <input type="file" id="native-cam-input" accept="image/*" capture="environment" style="display:none">
        </div>

        <div class="bg-white p-4 rounded-xl shadow-md flex gap-2">
            <input id="manual-code" type="text" placeholder="Código de barras manual" class="flex-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="add-manual-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Agregar</button>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-md space-y-4">
            <h2 class="text-lg font-semibold text-gray-700">Detalle de la Venta</h2>
            <div id="cart-items" class="space-y-2 max-h-64 overflow-y-auto pr-1">
                <p class="text-gray-400 text-center py-4">No hay productos en la lista</p>
            </div>
            <div class="flex justify-between items-center pt-4 border-t border-gray-200">
                <span class="text-lg font-bold text-gray-800">Total:</span>
                <span id="cart-total" class="text-2xl font-bold text-blue-600">Q0.00</span>
            </div>
            <button id="checkout-btn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg shadow hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                Confirmar Venta y Cobrar
            </button>
        </div>
    </main>

    <script>
        const API_URL = "https://backend-pos-tienda.onrender.com/api"; 
        let cart = [];
        let html5QrcodeScanner = null;

        // --- LÓGICA DE ESCANEO POR FOTO NATIVA ---
        const nativeInput = document.getElementById("native-cam-input");
        nativeInput.addEventListener("change", e => {
            if (e.target.files.length == 0) return;
            const imageFile = e.target.files[0];
            
            // Creamos instancia temporal solo para procesar la foto
            const scanner = new Html5Qrcode("reader");
            scanner.scanFile(imageFile, true)
                .then(decodedText => {
                    fetchProduct(decodedText);
                })
                .catch(err => {
                    Swal.fire({ icon: 'error', title: 'Ups', text: 'No se detectó código. Asegúrate de enfocar bien las líneas del código.' });
                });
        });

        // --- FUNCIONES DEL SISTEMA ---
        async function fetchProduct(code) {
            try {
                const response = await fetch(`${API_URL}/productos/${code}`);
                if (!response.ok) {
                    const errData = await response.json();
                    Swal.fire({ icon: 'error', title: 'Oops...', text: errData.detail || "Error al buscar el producto." });
                    return;
                }
                const product = await response.json();
                addToCart(product);
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Sin conexión', text: 'No se pudo conectar con el servidor.' });
            }
        }

        function addToCart(product) {
            const existingItem = cart.find(item => item.codigo === product.codigo);
            if (existingItem) {
                if (existingItem.cantidad < product.stock) {
                    existingItem.cantidad++;
                } else {
                    Swal.fire({ icon: 'warning', title: 'Límite de Stock', text: `Solo hay ${product.stock} unidades.` });
                    return;
                }
            } else {
                cart.push({ ...product, cantidad: 1 });
            }
            updateCartUI();
        }

        function updateCartUI() {
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<p class="text-gray-400 text-center py-4">No hay productos en la lista</p>`;
                cartTotalElement.innerText = "Q0.00";
                checkoutBtn.disabled = true;
                return;
            }
            cartItemsContainer.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center py-2 border-b">
                    <div><p class="font-medium">${item.nombre}</p><p class="text-xs text-gray-500">Q${item.precio}</p></div>
                    <div class="flex items-center gap-2">
                        <button onclick="removeFromCart(${index})" class="text-red-500 font-bold">✕</button>
                        <span class="font-bold">${item.cantidad}</span>
                    </div>
                </div>
            `).join("");
            const total = cart.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
            cartTotalElement.innerText = `Q${total.toFixed(2)}`;
            checkoutBtn.disabled = false;
        }

        function removeFromCart(index) { cart.splice(index, 1); updateCartUI(); }

        // --- SISTEMA DE CÁMARA (VIVO) ---
        function stopScanning() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().catch(err => console.log(err));
                startBtn.classList.remove("hidden");
                stopBtn.classList.add("hidden");
            }
        }

        const startBtn = document.getElementById("start-btn");
        const stopBtn = document.getElementById("stop-btn");
        
        startBtn.addEventListener("click", () => {
            startBtn.classList.add("hidden");
            stopBtn.classList.remove("hidden");
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 150 } },
                (decodedText) => {
                    fetchProduct(decodedText);
                    stopScanning();
                }
            ).catch(err => {
                Swal.fire({ icon: 'error', title: 'Cámara Inaccesible', text: 'Error al iniciar.' });
                stopScanning();
            });
        });

        stopBtn.addEventListener("click", stopScanning);
        
        // --- MANUAL ---
        document.getElementById("add-manual-btn").addEventListener("click", () => {
            const code = document.getElementById("manual-code").value.trim();
            if (code) { fetchProduct(code); document.getElementById("manual-code").value = ""; }
        });

    </script>
</body>
</html>
