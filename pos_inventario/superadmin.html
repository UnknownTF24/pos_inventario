<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Súper Admin - SaaS Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* MODO OSCURO ELEGANTE (Soft Dark Mode) */
        html.dark-mode body { background-color: #0f172a; color: #cbd5e1; }
        html.dark-mode .bg-white { background-color: #1e293b !important; border-color: #334155 !important; }
        html.dark-mode .bg-gray-50, html.dark-mode .bg-gray-100 { background-color: #0f172a !important; }
        html.dark-mode .text-gray-800, html.dark-mode .text-gray-900 { color: #f1f5f9 !important; }
        html.dark-mode .text-gray-700, html.dark-mode .text-gray-600 { color: #cbd5e1 !important; }
        html.dark-mode .text-gray-500 { color: #94a3b8 !important; }
        html.dark-mode thead { background-color: #0f172a !important; }
        html.dark-mode tr.hover\:bg-gray-50:hover { background-color: #334155 !important; }
        html.dark-mode .swal2-popup { background-color: #1e293b !important; color: #f1f5f9 !important; }
        html.dark-mode .swal2-title { color: #f1f5f9 !important; }
        html.dark-mode .swal2-html-container { color: #cbd5e1 !important; }
        html.dark-mode input.swal2-input { background-color: #0f172a !important; color: #f1f5f9 !important; border-color: #334155 !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen">
    
    <nav class="bg-indigo-900 text-white shadow-lg p-4 flex justify-between items-center border-b-4 border-indigo-500">
        <h1 class="text-xl md:text-2xl font-black">⚙️ Panel Súper Admin (SaaS Control)</h1>
        <button onclick="cerrarSesion()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded font-bold shadow transition">Salir del Sistema</button>
    </nav>

    <main class="max-w-6xl mx-auto p-4 mt-6">
        <div class="bg-white rounded-xl shadow-xl p-6">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <h2 class="text-2xl font-bold text-gray-800">🏢 Tiendas y Suscripciones</h2>
                <button onclick="crearNuevaTienda()" class="bg-green-600 hover:bg-green-700 text-white font-black py-3 px-6 rounded-lg shadow-lg transition w-full md:w-auto">+ Registrar Nuevo Cliente</button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead class="bg-gray-100 text-gray-700">
                        <tr>
                            <th class="p-3 border-b">ID</th>
                            <th class="p-3 border-b">Nombre del Negocio</th>
                            <th class="p-3 border-b text-center">Estado</th>
                            <th class="p-3 border-b font-bold text-blue-600">Vencimiento</th>
                            <th class="p-3 border-b text-center">Control y Pagos</th>
                        </tr>
                    </thead>
                    <tbody id="lista-tiendas" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Botón flotante Modo Oscuro Elegante -->
    <button onclick="toggleDarkMode()" class="fixed bottom-4 right-4 bg-gray-800 text-gray-200 p-3 rounded-full shadow-2xl z-[100] hover:scale-110 transition border border-gray-600">🌙</button>

    <script>
        const API_URL = "https://backend-pos-tienda.onrender.com/api";

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark-mode'));
        }
        if(localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark-mode');

        function cerrarSesion() { sessionStorage.clear(); window.location.href = "index.html"; }

        async function fetchConToken(url, options = {}) {
            const token = sessionStorage.getItem("adminToken"); 
            if (!options.headers) options.headers = {}; 
            if (token) options.headers["Authorization"] = `Bearer ${token}`;
            try {
                const res = await fetch(url, options);
                if (res.status === 401) { cerrarSesion(); throw new Error("No autorizado"); }
                return res;
            } catch (err) { throw err; }
        }

        async function cargarTiendas() {
            try {
                const res = await fetchConToken(`${API_URL}/saas/tiendas`);
                const tiendas = await res.json();
                const list = document.getElementById("lista-tiendas");
                
                list.innerHTML = tiendas.map(t => {
                    const esMaestra = t.id === 1;
                    
                    let estadoBadge = t.estado === 'activo' 
                        ? '<span class="bg-green-100 text-green-700 px-3 py-1 rounded text-xs font-black tracking-wide">ACTIVO</span>' 
                        : '<span class="bg-red-100 text-red-700 px-3 py-1 rounded text-xs font-black tracking-wide">SUSPENDIDO</span>';
                    
                    let acciones = esMaestra ? '<span class="text-gray-400 font-bold text-sm italic">Tienda Maestra (Intocable)</span>' : `
                        <button onclick="visitarTienda(${t.id})" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded text-sm shadow font-bold mr-2 transition">👀 Entrar al Panel</button>
                        <button onclick="renovarMensualidad(${t.id})" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded text-sm shadow font-bold transition">📅 Ajustar Fecha</button>
                    `;
                    
                    return `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-3 font-mono text-gray-500">${t.id}</td>
                        <td class="p-3 font-bold text-gray-800 text-lg">${t.nombre}</td>
                        <td class="p-3 text-center">${estadoBadge}</td>
                        <td class="p-3 font-black ${t.vencimiento ? 'text-blue-600' : 'text-gray-400'}">${t.vencimiento || 'Acceso Vitalicio'}</td>
                        <td class="p-3 text-center">${acciones}</td>
                    </tr>`;
                }).join("");
            } catch (e) {
                Swal.fire("Error", "No se pudieron cargar las tiendas", "error");
            }
        }

        async function renovarMensualidad(id) {
            const { value: fechaSeleccionada } = await Swal.fire({
                title: 'Establecer Vencimiento',
                html: `
                    <p class="text-sm text-gray-500 mb-4">Elige hasta qué día tendrá acceso el cliente (Meses, semanas o días extra).</p>
                    <input type="date" id="swal-date" class="swal2-input text-lg" min="${new Date().toISOString().split('T')[0]}">
                `,
                confirmButtonText: 'Guardar Fecha',
                confirmButtonColor: '#10b981',
                showCancelButton: true,
                cancelButtonText: 'Cancelar',
                preConfirm: () => document.getElementById('swal-date').value
            });

            if (fechaSeleccionada) {
                try {
                    // Le agregamos la hora 23:59:59 para que caduque al último segundo de ese día
                    const res = await fetchConToken(`${API_URL}/saas/tiendas/${id}/renovar`, { 
                        method: "PUT",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({ nueva_fecha: fechaSeleccionada + " 23:59:59" })
                    });
                    if(res.ok) {
                        Swal.fire('¡Actualizado!', 'La fecha de acceso ha sido modificada exitosamente.', 'success');
                        cargarTiendas();
                    }
                } catch (e) { Swal.fire('Error', 'Fallo de red', 'error'); }
            }
        }

        async function crearNuevaTienda() {
            Swal.fire({
                title: 'Registrar Nuevo Cliente',
                html: `
                    <p class="text-sm text-gray-500 mb-4">Se creará la tienda y una cuenta de Administrador para el dueño del negocio.</p>
                    <input id="swal-nombre" class="swal2-input" placeholder="Nombre Comercial de la Tienda">
                    <input id="swal-user" class="swal2-input" placeholder="Usuario Admin (Ej. carlos_admin)">
                    <input id="swal-pass" class="swal2-input" placeholder="Contraseña Inicial">
                `,
                confirmButtonText: 'Crear Tienda (15 Días Gratis)',
                confirmButtonColor: '#2563eb',
                showCancelButton: true,
                cancelButtonText: 'Cancelar',
                preConfirm: () => {
                    return {
                        nombre: document.getElementById('swal-nombre').value,
                        admin_user: document.getElementById('swal-user').value,
                        admin_pass: document.getElementById('swal-pass').value,
                        admin_nombre: "Administrador de Tienda"
                    }
                }
            }).then(async (result) => {
                if (result.isConfirmed && result.value.nombre) {
                    try {
                        const res = await fetchConToken(`${API_URL}/saas/tiendas`, {
                            method: "POST",
                            headers: {"Content-Type": "application/json"},
                            body: JSON.stringify(result.value)
                        });
                        if (res.ok) {
                            Swal.fire('¡Cliente Creado!', 'La tienda se ha configurado correctamente con 15 días de prueba.', 'success');
                            cargarTiendas();
                        }
                    } catch(e) {}
                }
            });
        }

        async function visitarTienda(id) {
            try {
                const res = await fetchConToken(`${API_URL}/saas/impersonate/${id}`, { method: "POST" });
                if(res.ok) {
                    const data = await res.json();
                    sessionStorage.setItem("masterToken", sessionStorage.getItem("adminToken"));
                    sessionStorage.setItem("adminToken", data.token);
                    sessionStorage.setItem("tienda_id", data.tienda_id);
                    window.location.href = "admin.html";
                }
            } catch(e) {}
        }

        if(sessionStorage.getItem("adminToken") && sessionStorage.getItem("rolUsuario") === "superadmin") {
            cargarTiendas();
        } else {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
